name: Build Android APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Đảm bảo có Gradle Wrapper và cấp quyền thực thi
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Khôi phục Debug Keystore từ Base64
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Da khoi phuc debug.keystore thanh cong."
        else
          echo "Khong tim thay debug.keystore.base64!"
          exit 1
        fi

    - name: Biên dịch APK gỡ lỗi (Debug APK)
      run: ./gradlew assembleDebug

    - name: Tải tệp APK thành phẩm lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SpaceZ-AI-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
